# New Relic Configuration File
# This is a placeholder configuration for New Relic APM monitoring
# To enable monitoring, replace with actual New Relic configuration

[newrelic]
# License key (required for activation)
license_key = YOUR_LICENSE_KEY_HERE

# Application name in New Relic UI
app_name = Knowledge Robot API

# Logging
log_file = /tmp/newrelic-python-agent.log
log_level = info

# Distributed tracing
distributed_tracing.enabled = true

# For development/testing without New Relic, leave license_key empty
# The agent will run in disabled mode
