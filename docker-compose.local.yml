# Local development Docker Compose
# Usage: docker-compose -f docker-compose.local.yml up --build

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    extra_hosts:
      # Lets the container reach a local LLM server running on the host
      # via http://host.docker.internal:<port>/v1 (LLM_PROFILE=local* path).
      # Docker Desktop on Windows/Mac resolves this automatically; this
      # explicit mapping makes the same setup work on native Linux too.
      - "host.docker.internal:host-gateway"
    environment:
      # Development settings (override defaults from env_file if needed)
      - DEBUG_MODE=true
      - USE_AGENTIC=true
      - ALLOWED_ORIGINS=http://localhost:3000
      # API_SECRET_KEY not set = auth disabled (dev mode)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Server-side only - backend URL for API proxy
      - BACKEND_URL=http://backend:8080
      # No API_SECRET_KEY needed for local dev (backend auth disabled)
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
