[tool.pytest.ini_options]
# Tests import from API/ as if the cwd were API/ (matching how the app runs in
# production via `cd API && python api.py`). Pytest's pythonpath option adds
# these directories to sys.path before collection.
pythonpath = ["API"]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
